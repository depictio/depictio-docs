name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v0.6.0-b5)'
        required: true
      alias:
        description: 'Alias (latest, beta, or none)'
        required: false
        default: 'beta'
      depictio_ref:
        description: 'depictio/depictio ref to build the component catalog from'
        required: false
        default: 'main'

jobs:
  deploy-mike:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv sync

      - name: Get version from pyproject.toml
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            ALIAS="${{ github.event.inputs.alias }}"
          else
            VERSION="v$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
            # Beta releases get 'beta' alias, stable get 'latest'
            if [[ "$VERSION" == *"-b"* ]]; then
              ALIAS="beta"
            else
              ALIAS="latest"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "alias=${ALIAS}" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      # The component catalog gallery is generated on the fly from the depictio
      # source repo and is NOT committed to this repo (see .gitignore). mkdocs
      # copies docs/assets/ into the build regardless of gitignore, so the freshly
      # generated HTML ships with this mike version.
      - name: Checkout depictio source (catalog gallery)
        uses: actions/checkout@v4
        with:
          repository: depictio/depictio
          ref: ${{ github.event.inputs.depictio_ref || 'main' }}
          path: depictio-src

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build catalog gallery bundle
        working-directory: depictio-src
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter ./depictio/viewer run build:catalog-preview

      # Run from depictio-src so uv resolves its pyproject.toml (installs the
      # depictio package + deps into an isolated env, separate from the docs env).
      - name: Generate catalog gallery HTML (light + dark)
        working-directory: depictio-src
        run: |
          uv run python -m depictio.cli catalog gallery \
            --theme light --no-open --out "$GITHUB_WORKSPACE/docs/assets/component-catalog-light.html"
          uv run python -m depictio.cli catalog gallery \
            --theme dark --no-open --out "$GITHUB_WORKSPACE/docs/assets/component-catalog-dark.html"

      - name: Deploy with mike
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS="${{ steps.version.outputs.alias }}"

          if [ "$ALIAS" == "latest" ]; then
            # Stable releases get both 'latest' and 'stable' aliases
            uv run mike deploy --push --update-aliases "$VERSION" latest stable
            # Set stable as default for root redirect
            uv run mike set-default --push stable
          elif [ "$ALIAS" != "none" ] && [ -n "$ALIAS" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" "$ALIAS"
          else
            uv run mike deploy --push "$VERSION"
          fi

      - name: Summary
        run: |
          echo "## Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Alias**: ${{ steps.version.outputs.alias }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://depictio.github.io/depictio-docs/${{ steps.version.outputs.version }}/" >> $GITHUB_STEP_SUMMARY
